- id: "personality.001"
  version: "1.0.0"
  category: "personality"
  subcategory: "lagna_lord_strength"
  title: "Strong Lagna Lord Self-Presentation Indicator"
  description: "For Aries ascendant foundation contexts, a strong Mars as Lagna lord is treated as a broad indicator for confident self-presentation. This is a tendency marker only, not a fixed personality type."
  priority: 150
  enabled: true
  conditions:
    all_of:
      - field: "lagna.rashi_index"
        operator: "equals"
        value: 1
      - field: "mars.strength.status"
        operator: "equals"
        value: "strong"
  result:
    status: "present"
    confidence: 0.8
    supporting_factors: ["Aries Lagna foundation context with strong Mars as Lagna lord."]
    challenging_factors: []
    involved_planets: ["mars"]
    involved_houses: [1]
    reasons: ["strong_aries_lagna_lord"]
    metadata:
      tendency_only: true
      not_psychological_diagnosis: true
      context_dependent: true
      ascendant: "Aries"

