- id: "career.001"
  version: "1.0.0"
  category: "career"
  subcategory: "house_placement"
  title: "Strong 10th House Placement"
  description: "An exalted or strong planet placed in the 10th house of career and profession, indicating enhanced vocational focus."
  priority: 150
  enabled: true
  conditions:
    any_of:
      - all_of:
          - field: "mars.house"
            operator: "equals"
            value: 10
          - field: "mars.dignity.is_exalted"
            operator: "equals"
            value: true
      - all_of:
          - field: "sun.house"
            operator: "equals"
            value: 10
          - field: "sun.dignity.is_exalted"
            operator: "equals"
            value: true
      - all_of:
          - field: "jupiter.house"
            operator: "equals"
            value: 10
          - field: "jupiter.strength.status"
            operator: "equals"
            value: "strong"
  result:
    status: "present"
    confidence: 0.8
    supporting_factors: ["An exalted or strong planet occupies the 10th house."]
    challenging_factors: []
    involved_planets: ["mars", "sun", "jupiter"]
    involved_houses: [10]
    reasons: ["exalted_or_strong_planet_in_10th"]
    metadata:
      astrological_significance: "Enhances leadership and career progress."

