- id: "children.001"
  version: "1.0.0"
  category: "children"
  subcategory: "house_placement"
  title: "Strong 5th House Placement"
  description: "An exalted benefic planet occupies the 5th house of progeny, indicating a supportive and protective influence on children-related matters."
  priority: 150
  enabled: true
  conditions:
    any_of:
      - all_of:
          - field: "jupiter.house"
            operator: "equals"
            value: 5
          - field: "jupiter.dignity.is_exalted"
            operator: "equals"
            value: true
      - all_of:
          - field: "venus.house"
            operator: "equals"
            value: 5
          - field: "venus.dignity.is_exalted"
            operator: "equals"
            value: true
  result:
    status: "present"
    confidence: 0.8
    supporting_factors: ["An exalted benefic occupies the 5th house."]
    challenging_factors: []
    involved_planets: ["jupiter", "venus"]
    involved_houses: [5]
    reasons: ["exalted_benefic_in_5th"]
    metadata:
      not_medical_advice: true
      no_fertility_diagnosis: true
      requires_professional_evaluation: true
      astrological_significance: "Brings strong protective energy to progeny matters."

